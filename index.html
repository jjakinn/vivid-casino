    <script>
    // Inline game grid injection - 2 conveyor belt rows
    (function() {
      const CDN = 'https://d3ta80o5sbquaz.cloudfront.net/images';

      const PRAGMATIC = [
        { title: 'Gates of Olympus', provider: 'pragmatic', id: 'vs20olympgate' },
        { title: 'Sweet Bonanza', provider: 'pragmatic', id: 'vs20fruitsw' },
        { title: 'Big Bass Bonanza', provider: 'pragmatic', id: 'vs10txbigbass' },

        { title: 'The Dog House', provider: 'pragmatic', id: 'vs20doghouse' },

      const EVOLUTION = [

      function createTile(game) {
        const tile = document.createElement('div');
        tile.className = 'game-tile';
        tile.style.cssText = 'position:relative;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.2s;aspect-ratio:0.71;background:#1a1a2e;flex:0 0 auto;width:200px;height:280px;';
        tile.onmouseenter = () => tile.style.transform = 'scale(1.05)';
        tile.onmouseleave = () => tile.style.transform = 'scale(1)';

        const img = document.createElement('img');
        img.src = `${CDN}/${game.provider}/${game.id}.webp`;
        img.alt = game.title;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.onerror = function() {
          this.style.display = 'none';
          const fallback = document.createElement('div');
          fallback.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#222;color:#aaa;font-size:12px;text-align:center;padding:8px;';
          fallback.textContent = game.title;
          tile.appendChild(fallback);
        };

        const label = document.createElement('div');
        label.textContent = game.title;
        label.style.cssText = 'position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:rgba(0,0,0,0.7);color:#fff;font-size:12px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';

        tile.appendChild(img);
        tile.appendChild(label);
        return tile;
      }

      function createConveyorRow(games, direction) {
        // Duplicate games for seamless loop
        const allGames = [...games, ...games, ...games, ...games];

        const track = document.createElement('div');
        track.className = 'conveyor-track';
        track.style.cssText = `display:flex;gap:16px;width:max-content;animation:conveyor-${direction} 30s linear infinite;`;

        allGames.forEach(game => {
          track.appendChild(createTile(game));
        });

        const wrapper = document.createElement('div');
        wrapper.className = 'conveyor-wrapper';
        wrapper.style.cssText = 'overflow:hidden;width:100%;padding:10px 0;';
        wrapper.appendChild(track);

        return wrapper;
      }

      function inject() {
        const headings = document.querySelectorAll('h2');
        let target = null;
        for (const h of headings) {
          if (h.textContent.includes('Games') || h.textContent.includes('Favorite')) {
            target = h.closest('div[class*="bg-"]') || h.closest('div') || h.parentElement;
            break;
          }
        }
        if (!target) return;

        // Nuke every child of target except the h2 heading itself
        // This wipes all stale Vue loading rows and any previous injections
        const children = Array.from(target.children);
        for (const child of children) {
          if (child.tagName !== 'H2') {
            child.remove();
          }
        }

        // Inject CSS animation keyframes once
        if (!document.getElementById('conveyor-css')) {
          const style = document.createElement('style');
          style.id = 'conveyor-css';
          style.textContent = `
            @keyframes conveyor-left {
              0% { transform: translateX(0); }
              100% { transform: translateX(-50%); }
            }
            @keyframes conveyor-right {
              0% { transform: translateX(-50%); }
              100% { transform: translateX(0); }
            }
            .conveyor-wrapper:hover .conveyor-track {
              animation-play-state: paused;
            }
          `;
          document.head.appendChild(style);
        }

        // Row 1: Pragmatic - scrolls left
        target.appendChild(createConveyorRow(PRAGMATIC, 'left'));

        // Row 2: Evolution - scrolls right
        target.appendChild(createConveyorRow(EVOLUTION, 'right'));
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(inject, 2000));
      } else {
        setTimeout(inject, 2000);
      }
      setTimeout(inject, 5000);
    })();
    </script>

          if (
