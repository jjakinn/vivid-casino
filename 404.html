        tile.appendChild(label);
        return tile;
      }

      function createConveyorRow(games, direction) {
        // Duplicate games for seamless loop
        const allGames = [...games, ...games, ...games, ...games];

        const track = document.createElement('div');
        track.className = 'conveyor-track';
        track.style.cssText = `display:flex;gap:16px;width:max-content;animation:conveyor-${direction} 30s linear infinite;`;

        allGames.forEach(game => {
          track.appendChild(createTile(game));
        });

        const wrapper = document.createElement('div');
        wrapper.className = 'conveyor-wrapper';
        wrapper.style.cssText = 'overflow:hidden;width:100%;padding:10px 0;';
        wrapper.appendChild(track);

        return wrapper;
      }

      function inject() {
        const headings = document.querySelectorAll('h2');
        let target = null;
        for (const h of headings) {
          if (h.textContent.includes('Games') || h.textContent.includes('Favorite')) {
            target = h.closest('div[class*="bg-"]') || h.closest('div') || h.parentElement;
            break;
          }
        }
        if (!target) return;

        // Nuke every child of target except the h2 heading itself
        // This wipes all stale Vue loading rows and any previous injections
        const children = Array.from(target.children);
        for (const child of children) {
          if (child.tagName !== 'H2') {
            child.remove();
          }
        }

        // Inject CSS animation keyframes once
        if (!document.getElementById('conveyor-css')) {
          const style = document.createElement('style');
          style.id = 'conveyor-css';
          style.textContent = `
            @keyframes conveyor-left {
              0% { transform: translateX(0); }
              100% { transform: translateX(-50%); }
            }
            @keyframes conveyor-right {
              0% { transform: translateX(-50%); }
              100% { transform: translateX(0); }
            }
            .conveyor-wrapper:hover .conveyor-track {
              animation-play-state: paused;
            }
          `;
          document.head.appendChild(style);
        }

        // Row 1: Pragmatic - scrolls left
        target.appendChild(createConveyorRow(PRAGMATIC, 'left'));

        // Row 2: Evolution - scrolls right
        target.appendChild(createConveyorRow(EVOLUTION, 'right'));
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(inject, 2000));
      } else {
        setTimeout(inject, 2000);
      }
      setTimeout(inject, 5000);
    })();
    </script>

    <script type="text/javascript">
      function afterRemoveCookiePopup(elem) {
        if (elem) {
          elem.style.bottom = '0px';
        }
      }

      function waitForOneTrustElements() {
        const intervalId = setInterval(() => {
          const policyText = document.querySelector('#onetrust-policy-text');
          const buttonParentGroup = document.querySelector(
            '#onetrust-button-group-parent',
          );
          const buttonGroup = document.querySelector('#onetrust-button-group');
          const acceptButton = document.querySelector('#onetrust-accept-btn-handler');
          const rejectButton = document.querySelector('#onetrust-reject-all-handler');
          const settingsButton = document.querySelector('#onetrust-pc-btn-handler');
          const registerBtnWrapper = document.getElementById('register-btn-wrapper');

          policyText && (policyText.style.color = '#ccc');
          if (
            policyText &&
            buttonParentGroup &&
            buttonGroup &&
            acceptButton &&
            rejectButton &&
            settingsButton
          ) {
            clearInterval(intervalId);
            document
              .getElementById('onetrust-close-btn-container')
              .addEventListener('click', () =>
                afterRemoveCookiePopup(registerBtnWrapper),
              );
            document
              .getElementById('onetrust-accept-btn-handler')
              .addEventListener('click', () =>
                afterRemoveCookiePopup(registerBtnWrapper),
              );
            document
              .getElementById('onetrust-reject-all-handler')
              .addEventListener('click', () =>
                afterRemoveCookiePopup(registerBtnWrapper),
              );
            if (window.innerWidth < 768) {
              const settingsLink = document.createElement('a');
              settingsLink.textContent = 'Cookie Settings';
              settingsLink.style.marginLeft = '5px';
              settingsLink.style.textDecoration = 'underline';
              settingsLink.style.cursor = 'pointer';
              settingsLink.addEventListener('click', (event) => {
                event.preventDefault();
                settingsButton.click();
              });
              policyText.appendChild(document.createTextNode(' '));
              policyText.appendChild(settingsLink);
              settingsLink.style.color = 'white';
              buttonGroup.removeChild(settingsButton);
              if (registerBtnWrapper) {
                registerBtnWrapper.style.bottom = '122px';
              }
            } else {
              settingsButton.style.border = 'none';
              acceptButton.style.fontSize = '16px';
              acceptButton.style.fontWeight = 'bold';
              acceptButton.style.border = 'solid 1px #cd5bff';
              acceptButton.style.color = '#cd5bff';
            }
          }
        }, 300);
      }

      // Start waiting for OneTrust elements after a delay to account for deferred loading
      setTimeout(waitForOneTrustElements, 2500);
    </script>
